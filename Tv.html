<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Muzahidul TV Pro - Grid Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Video Container - Fixed size, No Zoom */
        #videoPlayer { width: 100%; height: 60vh; background: #000; object-fit: contain; }
        
        /* Grid Channel List */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        .ch-card { background: #1a1a1a; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border: 2px solid #333; transition: 0.3s; }
        .ch-card:hover { border-color: #ff0000; }
        .ch-num { font-size: 12px; color: #888; }
        .ch-name { font-size: 14px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<video id="videoPlayer" autoplay playsinline controls></video>

<div class="grid-container" id="grid"></div>

<script>
    const channels = [
        {no: "01", name: "Jamuna TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/index.m3u8"},
        {no: "02", name: "Somoy TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8"},
        {no: "03", name: "Channel 24", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8"},
        {no: "04", name: "Independent", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8"},
        {no: "05", name: "Ekattor", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1705/output/index.m3u8"},
        {no: "06", name: "ATN News", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1706/output/index.m3u8"},
        {no: "07", name: "BTV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8"},
        {no: "08", name: "Deepto TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1711/output/index.m3u8"},
        {no: "09", name: "Bangla Vision", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1715/output/index.m3u8"},
        {no: "10", name: "NTV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1716/output/index.m3u8"},
        {no: "11", name: "HUM TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1721/output/index.m3u8"},
        {no: "12", name: "ATN Bangla", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1722/output/index.m3u8"},
        {no: "13", name: "Channel I", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1723/output/index.m3u8"}
    ];

    // HLS Configuration for Bufferless & Fast Play
    const hls = new Hls({
        maxBufferLength: 5,
        maxMaxBufferLength: 10,
        lowLatencyMode: true,
        enableWorker: true
    });

    const video = document.getElementById('videoPlayer');
    const grid = document.getElementById('grid');

    channels.forEach((ch, index) => {
        const card = document.createElement('div');
        card.className = 'ch-card';
        card.innerHTML = `<div class="ch-num">${ch.no}</div><div class="ch-name">${ch.name}</div>`;
        card.onclick = () => {
            hls.loadSource(ch.url);
            hls.attachMedia(video);
            video.play();
        };
        grid.appendChild(card);
    });

    // Start with 1st channel
    hls.loadSource(channels[0].url);
    hls.attachMedia(video);
</script>
</body>
</html>
