<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Muzahidul TV - Premium Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --accent: #e50914; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #videoPlayer { width: 100vw; height: 100vh; object-fit: contain; }
        
        /* UI HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; opacity: 0; transition: opacity 0.3s; }
        #hud.active { opacity: 1; }
        
        /* Channel List Slider */
        #slider { display: flex; gap: 20px; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .card { width: 220px; height: 140px; background: rgba(30,30,30,0.9); border: 3px solid #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: transform 0.3s, border-color 0.3s; }
        .card.active { border-color: var(--accent); transform: scale(1.15); background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<video id="videoPlayer" autoplay playsinline></video>

<div id="hud">
    <div style="font-size: 24px; font-weight: bold;" id="currentTime"></div>
    <div id="slider"></div>
</div>

<script>
    const channels = [
        {name: "Deepto TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1711/output/index.m3u8"},
        {name: "Bangla Vision", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1715/output/index.m3u8"},
        {name: "BTV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8"},
        {name: "HUM TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1721/output/index.m3u8"},
        {name: "NTV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1716/output/index.m3u8"},
        {name: "ATN Bangla", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1722/output/index.m3u8"},
        {name: "Channel I", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1723/output/index.m3u8"},
        {name: "Jamuna TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/index.m3u8"},
        {name: "ATN News", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1706/output/index.m3u8"},
        {name: "Channel 24", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8"},
        {name: "Ekattor", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1705/output/index.m3u8"},
        {name: "Independent", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8"},
        {name: "Somoy", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8"}
    ];

    let index = 0;
    const hud = document.getElementById('hud');
    const slider = document.getElementById('slider');
    const video = document.getElementById('videoPlayer');

    // UI তৈরি
    channels.forEach((ch, i) => {
        const div = document.createElement('div');
        div.className = 'card' + (i === 0 ? ' active' : '');
        div.innerText = ch.name;
        slider.appendChild(div);
    });

    // রিমোট কন্ট্রোল লজিক
    document.addEventListener('keydown', (e) => {
        hud.classList.add('active');
        clearTimeout(window.hideHud);
        window.hideHud = setTimeout(() => hud.classList.remove('active'), 4000);

        if (e.key === 'ArrowRight' && index < channels.length - 1) index++;
        if (e.key === 'ArrowLeft' && index > 0) index--;
        if (e.key === 'Enter') play(channels[index].url);

        updateSlider();
    });

    function updateSlider() {
        document.querySelectorAll('.card').forEach((c, i) => c.classList.toggle('active', i === index));
        slider.style.transform = `translateX(-${index * 240}px)`;
    }

    function play(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            video.play();
        }
    }

    // টাইম আপডেট
    setInterval(() => document.getElementById('currentTime').innerText = new Date().toLocaleTimeString(), 1000);

    play(channels[0].url);
</script>
</body>
  </html>
