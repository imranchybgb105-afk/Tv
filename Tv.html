<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Muzahidul TV Pro - Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #videoPlayer { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
        
        /* OSD Style */
        #osd { position: absolute; top: 30px; left: 30px; background: rgba(0,0,0,0.85); padding: 25px; border-radius: 15px; border-left: 8px solid #ff0000; display: none; z-index: 100; }
        .ch-num { color: #ff0000; font-size: 32px; font-weight: bold; }
        .ch-name { font-size: 40px; margin-top: 5px; }
    </style>
</head>
<body>

<video id="videoPlayer" autoplay playsinline></video>

<div id="osd">
    <div class="ch-num" id="chNum">01</div>
    <div class="ch-name" id="chName">Loading...</div>
</div>

<script>
    const channels = [
        {no: "01", name: "Jamuna TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/index.m3u8"},
        {no: "02", name: "Somoy TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8"},
        {no: "03", name: "Channel 24", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8"},
        {no: "04", name: "Independent TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8"},
        {no: "05", name: "Ekattor TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1705/output/index.m3u8"},
        {no: "06", name: "ATN News", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1706/output/index.m3u8"},
        {no: "07", name: "BTV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8"},
        {no: "08", name: "Deepto TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1711/output/index.m3u8"},
        {no: "09", name: "Bangla Vision", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1715/output/index.m3u8"},
        {no: "10", name: "NTV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1716/output/index.m3u8"},
        {no: "11", name: "HUM TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1721/output/index.m3u8"},
        {no: "12", name: "ATN Bangla", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1722/output/index.m3u8"},
        {no: "13", name: "Channel I", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1723/output/index.m3u8"}
    ];

    let cur = 0;
    let inputBuffer = "";
    const video = document.getElementById('videoPlayer');
    const hls = new Hls({maxBufferLength: 10, lowLatencyMode: true});

    function showOSD(i) {
        document.getElementById('chNum').innerText = channels[i].no;
        document.getElementById('chName').innerText = channels[i].name;
        document.getElementById('osd').style.display = 'block';
        setTimeout(() => document.getElementById('osd').style.display = 'none', 3000);
    }

    function playCh(i) {
        cur = i;
        showOSD(i);
        hls.loadSource(channels[i].url);
        hls.attachMedia(video);
        video.play();
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowUp') { cur = (cur > 0) ? cur - 1 : channels.length - 1; playCh(cur); }
        if(e.key === 'ArrowDown') { cur = (cur < channels.length - 1) ? cur + 1 : 0; playCh(cur); }
        if(e.key >= '0' && e.key <= '9') {
            inputBuffer += e.key;
            document.getElementById('chNum').innerText = inputBuffer;
            document.getElementById('osd').style.display = 'block';
            clearTimeout(window.timer);
            window.timer = setTimeout(() => {
                let target = channels.findIndex(c => c.no === inputBuffer);
                if(target !== -1) playCh(target);
                inputBuffer = "";
            }, 1000);
        }
    });

    playCh(0);
</script>
</body>
</html>
